            --surface: #ffffff;
            --surface-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-tertiary: #64748b;
            --border-light: #e2e8f0;
            --accent: #2563eb;
            --accent-light: #3b82f6;
            --accent-soft: #eff6ff;
            --accent-orange: #f97316;
            --accent-orange-light: #fb923c;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --badge-bg: #f1f5f9;
        }

        body.dark {
            --bg-page: #0f172a;
            --surface: #1e293b;
            --surface-card: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-tertiary: #94a3b8;
            --border-light: #334155;
            --accent: #3b82f6;
            --accent-light: #60a5fa;
            --accent-soft: #1e293b;
            --accent-orange: #f97316;
            --badge-bg: #334155;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-primary);
            line-height: 1.5;
            transition: background 0.2s, color 0.2s;
            scroll-behavior: smooth;
            font-size: 18px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(248, 250, 252, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-light);
            padding: 0.7rem 0;
            font-size: 0.9rem;
        }
        body.dark .navbar {
            background: rgba(15, 23, 42, 0.85);
        }
        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo {
            font-weight: 700;
            font-size: 1.3rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-orange));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
            font-size: 0.9rem;
        }
        .nav-links a:hover { color: var(--accent-orange); }
        .nav-actions {
            display: flex;
            gap: 0.6rem;
            align-items: center;
        }
        .icon-btn {
            background: var(--badge-bg);
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .icon-btn:hover {
            background: var(--accent-soft);
            color: var(--accent-orange);
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
            padding: 2rem 0 1rem;
        }
        .hero-left {
            flex-shrink: 0;
        }
        .hero-left h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, var(--accent), var(--accent-orange));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .hero-right {
            flex: 1;
        }
        .hero-right p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }
        .hero-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin: 0.5rem 0;
        }
        .hero-tags .badge {
            font-size: 0.9rem;
            padding: 0.3rem 1rem;
        }
        .contact-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 0.5rem;
        }
        .btn-primary, .btn-phone {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.95rem;
        }
        .btn-primary:hover, .btn-phone:hover {
            background: var(--accent-orange);
            transform: scale(0.98);
        }

        .card {
            background: var(--surface);
            border-radius: 1.25rem;
            padding: 1.2rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }
        .section {
            margin: 2.5rem 0;
        }
        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            letter-spacing: -0.01em;
            border-left: 4px solid var(--accent-orange);
            padding-left: 1rem;
        }

        .badge {
            display: inline-block;
            background: var(--badge-bg);
            padding: 0.25rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .skill-badge {
            background: var(--accent-soft);
            color: var(--accent);
        }

        .highlights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.2rem;
            margin: 1rem 0;
        }
        .highlight-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent-orange);
        }

        .exp-item {
            margin-bottom: 2rem;
            background: var(--surface);
            border-radius: 1.25rem;
            padding: 1.2rem;
            border: 1px solid var(--border-light);
        }
        .exp-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            margin-bottom: 0.6rem;
        }
        .exp-company {
            font-weight: 700;
            font-size: 1.2rem;
        }
        .exp-date {
            color: var(--text-tertiary);
            font-size: 0.85rem;
        }
        .exp-points {
            list-style: none;
            margin-left: 0;
            padding-left: 0;
        }
        .exp-points li {
            margin-bottom: 0.6rem;
            padding-left: 1.2rem;
            position: relative;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        .exp-points li::before {
            content: "•";
            color: var(--accent-orange);
            font-weight: bold;
            position: absolute;
            left: 0;
        }
        .exp-highlight {
            font-weight: 600;
            color: var(--accent-orange);
        }

        .carousel {
            margin-top: 1rem;
            border-radius: 1rem;
            background: var(--badge-bg);
            padding: 0.5rem;
        }
        .carousel-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            gap: 1rem;
            padding-bottom: 0.5rem;
            -webkit-overflow-scrolling: touch;
        }
        .carousel-slide {
            flex: 0 0 auto;
            width: 300px;
            max-width: 320px;
            scroll-snap-align: start;
            background: var(--surface-card);
            border-radius: 0.8rem;
            padding: 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 1px solid var(--border-light);
        }
        .carousel-slide .desc-text {
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 8px;
            line-height: 1.3;
            word-break: break-word;
        }
        .carousel-slide img {
            max-width: 100%;
            max-height: 150px;
            object-fit: contain;
            cursor: pointer;
            border-radius: 8px;
        }

        .projects-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .project-card {
            background: var(--surface);
            border-radius: 1.25rem;
            padding: 1.2rem;
            border: 1px solid var(--border-light);
        }
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }
        .project-header h3 {
            font-size: 1.3rem;
            margin: 0;
        }
        .project-date {
            color: var(--text-tertiary);
            font-size: 0.8rem;
        }

        .media-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }
        .media-item {
            flex: 1;
            min-width: 130px;
            background: var(--badge-bg);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.5rem;
            cursor: pointer;
        }
        .media-item img {
            max-width: 100%;
            max-height: 150px;
            object-fit: contain;
            border-radius: 8px;

            margin-top: 0.3rem;
            text-align: center;
        }

            grid-template-columns: repeat(3, 1fr);

        }
        .skill-category {
            background: var(--surface);
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid var(--border-light);
        }
        .skill-category h4 {
            font-size: 1rem;
            margin-bottom: 0.6rem;
            color: var(--accent-orange);
            border-left: 3px solid var(--accent-orange);
            padding-left: 0.5rem;
        }
        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .skill-tag {
            background: var(--badge-bg);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .edu-detail {
            margin-top: 0.8rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .edu-badge {
            background: var(--accent-orange);
            color: white;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .footer {
            text-align: center;
            padding: 2rem 0;
            border-top: 1px solid var(--border-light);
            margin-top: 2rem;
            color: var(--text-tertiary);
            font-size: 0.85rem;
        }
        .back-to-top {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: var(--accent-orange);
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: opacity 0.2s;
            opacity: 0;
            visibility: hidden;
        }
        .back-to-top.show {
            opacity: 1;
            visibility: visible;
        }
        .back-to-top:hover {
            background: var(--accent);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            max-width: 90%;
            max-height: 90%;
        }
        .modal-content img {
            width: auto;
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 8px;
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .close-modal:hover {
            color: var(--accent-orange);
        }

        @media (max-width: 768px) {
            .container { padding: 0 1rem; }
            .hero { flex-direction: column; align-items: flex-start; }
            .skills-grid { grid-template-columns: 1fr; }
            .nav-container { flex-direction: column; align-items: stretch; }
            .nav-links { justify-content: center; }
            .nav-actions { justify-content: center; }
            .media-item { min-width: 100px; }
            .carousel-slide { width: 260px; }
        }

        @media print {
            .navbar, .nav-actions, .back-to-top, .carousel-controls, .icon-btn, .modal {
                display: none !important;
            }
            body, .card, .exp-item {
                background: white;
                color: black;
                border: 1px solid #ccc;
            }
            .container { max-width: 100%; padding: 0; }
            .section { margin: 1rem 0; }
        }
    </style>
</head>

            skills: {
                ai: ["主流大模型工具", "AI数据标注", "垂直AI智能体", "脚本优化重复操作流程"],
                content: ["小红书", "微信公众号", "选题策划", "图文发布", "用户互动", "商业合作内容执行"],
                other: ["Excel", "飞书文档", "飞书多维表格", "信息整理", "进度跟进", "基础数据复盘", "SQL"]
            },
            education: {
                school: "南京工业职业技术大学",
                degree: "自动化技术与应用专业（本科）",
                period: "2023.09-2027.06",
                certificates: "英语 CET-4 577，CET-6 472；全国计算机二级（MS Office）",
                awards: "连续两年获得学业奖学金"
            }
        };

        function renderCarouselPractice(items) {
            if (!items || items.length === 0) return '';
            return `
                <div class="carousel">
                    <div class="carousel-container">
                        ${items.map(item => `
                            <div class="carousel-slide">
                                <div style="font-weight: 700; margin-bottom: 6px; color: var(--accent-orange); font-size:1rem;">${item.title}</div>
                                <div class="desc-text">${item.desc}</div>
                                <div style="background: var(--badge-bg); padding: 6px; border-radius: 8px; width: 100%; margin-top: 6px;">
                                    <img src="${item.imgSrc}" alt="${item.title}" onclick="openModal('${item.imgSrc}')" style="cursor:pointer;">
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function initCarousels() {
            document.querySelectorAll('.carousel').forEach(carousel => {
                const container = carousel.querySelector('.carousel-container');
                const prev = carousel.querySelector('.carousel-prev');
                const next = carousel.querySelector('.carousel-next');
                if (prev && next && container) {
                    prev.onclick = () => container.scrollBy({ left: -280, behavior: 'smooth' });
                    next.onclick = () => container.scrollBy({ left: 280, behavior: 'smooth' });
                }
            });
        }

        function renderHero() {
            const emailFull = resumeData.basics.email;
            return `
                <section id="hero" class="hero">
                    <div class="hero-left"><h1>${resumeData.basics.name}</h1></div>
                    <div class="hero-right">
                        <p>${resumeData.basics.shortBio}</p>
                        <div class="hero-tags">${resumeData.basics.keywords.map(k => `<span class="badge skill-badge">#${k}</span>`).join('')}</div>
                        <div class="contact-buttons">
                            <a href="mailto:${emailFull}" class="btn-primary">📧 ${emailFull}</a>
                            <button class="btn-phone" id="callBtn">📞 ${resumeData.basics.phone}</button>
                            <a href="${resumeData.basics.github}" target="_blank" rel="noopener" class="btn-primary">GitHub · Mon24123</a>
                        </div>
                    </div>
                </section>
            `;
        }

        function renderHighlights() {
            return `
                <div class="section" id="highlights">
                    <h2 class="section-title">✨ 亮点成果</h2>
                    <div class="highlights-grid">
                        ${resumeData.highlights.map(h => `<div class="card highlight-card"><div class="highlight-number">${h.number}</div><div style="font-size: 0.9rem; color: var(--text-secondary);">${h.label}</div></div>`).join('')}
                    </div>
                </div>
            `;
        }

        function renderInternships() {
            return `
                <div class="section" id="experience">
                    <h2 class="section-title">💼 实习经历</h2>
                    ${resumeData.internships.map(exp => `
                        <div class="exp-item">
                            <div class="exp-header"><span class="exp-company">${exp.company} · ${exp.role}</span><span class="exp-date">${exp.period}</span></div>
                            <ul class="exp-points">${exp.points.map(p => `<li class="${p.highlight ? 'exp-highlight' : ''}">${p.text}</li>`).join('')}</ul>
                            ${exp.keyPractices && exp.keyPractices.length ? `<div style="margin-top:1rem; font-weight:600; color:var(--accent-orange);font-size:0.85rem">📌 关键产出（可左右滑动，点击图片可放大）</div>${renderCarouselPractice(exp.keyPractices)}` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderProjects() {
            return `
                <div class="section" id="projects">
                    <h2 class="section-title">📌 项目实践</h2>
                    <div class="projects-grid">
                        ${resumeData.projects.map(project => renderProjectCard(project)).join('')}
                    </div>
                </div>
            `;
        }

        function renderProjectCard(project) {
            return `
                <div class="project-card">
                    <div class="project-header">
                        <h3>${project.name}</h3>
                        <span class="project-date">${project.period}</span>
                    </div>
                    <div class="skill-tags" style="margin-bottom: 0.6rem;">
                        ${project.techStack.map(t => `<span class="badge skill-badge">${t}</span>`).join('')}
                    </div>
                    <p style="font-size: 0.95rem; color: var(--text-secondary); margin-bottom: 0.8rem;">${project.result}</p>
                    ${project.links && project.links.length ? `
                        <div class="skill-tags" style="margin-bottom: 0.8rem;">
                            ${project.links.map(link => `<a class="badge skill-badge" href="${link.url}" target="_blank" rel="noopener" style="text-decoration:none;">🔗 ${link.label}</a>`).join('')}
                        </div>
                    ` : ''}
                    ${renderProjectMedia(project)}
                </div>
            `;
        }

        function renderProjectMedia(project) {
            if (!project.wechatImages && !project.xiaohongshuImages && !project.qrCodeImage && !project.goodTimeImages) return '';
            return `
                <div class="media-row">
                    ${(project.goodTimeImages || []).map((img, index) => `
                        <div class="media-item" onclick="openModal('${img}')">
                            <img src="${img}" alt="项目截图${index + 1}">
                        </div>
                    `).join('')}
                    ${(project.wechatImages || []).map((img, index) => `
                        <div class="media-item" onclick="openModal('${img}')">
                            <img src="${img}" alt="公众号截图${index + 1}">
                        </div>
                    `).join('')}
                    ${(project.xiaohongshuImages || []).map((img, index) => `
                        <div class="media-item" onclick="openModal('${img}')">
                            <img src="${img}" alt="小红书截图${index + 1}">
                        </div>
                    `).join('')}
                    ${project.qrCodeImage ? `
                        <div class="media-item" onclick="openModal('${project.qrCodeImage}')">
                            <img src="${project.qrCodeImage}" alt="公众号二维码">
                            <div class="qr-text">扫码查看公众号</div>
                        </div>
                    ` : ''}
                </div>
                ${project.xiaohongshuLink ? `
                    <div style="text-align: center; margin-top: 0.8rem;">
                        <a href="${project.xiaohongshuLink}" target="_blank" style="color: var(--accent-orange);">🔗 点击跳转小红书主页 >></a>
                    </div>
                ` : ''}
            `;
        }

        function renderSkills() {
            return `
                <div class="section" id="skills">
                    <h2 class="section-title">🧰 工具与能力</h2>
                    <div class="skills-grid">
                        <div class="skill-category"><h4>🤖 AI 能力</h4><div class="skill-tags">${resumeData.skills.ai.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div></div>
                        <div class="skill-category"><h4>🎨 内容能力</h4><div class="skill-tags">${resumeData.skills.content.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div></div>
                        <div class="skill-category"><h4>⚙️ 其他</h4><div class="skill-tags">${resumeData.skills.other.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div></div>
                    </div>
                </div>
            `;
        }

        function renderEducation() {
            return `
                <div class="section" id="education">
                    <h2 class="section-title">🎓 教育背景</h2>
                    <div class="card">
                        <div style="display: flex; justify-content: space-between; flex-wrap: wrap;">
                            <strong style="font-size:1.1rem;">${resumeData.education.school}</strong>
                            <span class="exp-date">${resumeData.education.period}</span>
                        </div>
                        <div style="margin: 0.3rem 0; font-size:0.95rem;">${resumeData.education.degree}</div>
                        <div class="edu-detail">
                            <span class="edu-badge">📜 ${resumeData.education.certificates}</span>
                            <span class="edu-badge">🏅 ${resumeData.education.awards}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderFullPage() {
            const root = document.getElementById('app-root');
            if (!root) return;
            root.innerHTML = `
                ${renderHero()}
                ${renderHighlights()}
                ${renderInternships()}
                ${renderProjects()}
                ${renderSkills()}
                ${renderEducation()}
                <footer class="footer">© 2026 毛雨晴 · 最后更新 2026.07 | 商务沟通 × 内容执行 × AI工具实践</footer>
            `;
            const callBtn = document.getElementById('callBtn');
            if (callBtn) callBtn.onclick = () => alert("电话: 198-2260-9828");
            initCarousels();
        }

        function initFeatures() {
            const themeBtn = document.getElementById('themeToggle');
            const printBtn = document.getElementById('printBtn');
            const backBtn = document.getElementById('backToTop');
            // 强制默认深色模式
            document.body.classList.add('dark');
            // 如果之前有存储的主题，则覆盖为深色（确保一致性）
            localStorage.setItem('theme', 'dark');
            themeBtn.onclick = () => {
                document.body.classList.toggle('dark');
                const isDark = document.body.classList.contains('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                themeBtn.textContent = isDark ? '🌓 浅色' : '🌓 深色';
            };
            printBtn.onclick = () => window.print();
            window.addEventListener('scroll', () => { if (window.scrollY > 300) backBtn.classList.add('show'); else backBtn.classList.remove('show'); });
            backBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
            document.querySelectorAll('[data-nav]').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const targetId = link.getAttribute('href').slice(1);
                    const target = document.getElementById(targetId);
                    if (target) target.scrollIntoView({ behavior: 'smooth' });
                });
            });
        }

        renderFullPage();
        initFeatures();
    </script>
</body>
</html>
